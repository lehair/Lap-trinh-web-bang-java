<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm Bài Kiểm Tra</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fafbfc; }
        
        /* Navbar */
        .navbar-custom { background-color: #c9302c; padding: 12px 0; color: white; }
        .navbar-custom a { color: white; text-decoration: none; font-weight: 400; font-size: 15px; transition: 0.2s;}
        .navbar-custom a:hover { opacity: 0.8; }
        .logo-text { font-weight: 600; display: flex; align-items: center; font-size: 15px; line-height: 1.1; }
        .logo-icon { font-size: 26px; font-weight: 900; margin-right: 8px; position: relative;}
        .logo-icon span { color: #f39c12; }
        
        /* Main Content */
        .quiz-container { max-width: 750px; margin: 40px auto; }
        .quiz-card { background: white; border-radius: 24px; padding: 40px; box-shadow: 0 4px 30px rgba(0,0,0,0.06); border: 1px solid #f0f0f0; margin-bottom: 25px;}
        .quiz-title { font-weight: 800; text-align: center; font-size: 26px; margin-bottom: 30px; color: #111; }
        
        .question-title { font-size: 20px; font-weight: 700; margin-bottom: 25px; color: #111; line-height: 1.5; }
        
        .option-label { display: flex; align-items: center; padding: 12px 10px; cursor: pointer; border-radius: 8px; transition: 0.2s; font-size: 16.5px; color: #333; margin-bottom: 5px; }
        .option-label:hover { background-color: #f8f9fa; }
        .option-input { width: 20px; height: 20px; margin-right: 15px; cursor: pointer; accent-color: #c9302c; }
        
        .submit-btn { background-color: #f6a111; color: white; font-weight: 700; font-size: 16px; border-radius: 50px; padding: 14px 40px; border: none; box-shadow: 0 4px 15px rgba(246, 161, 17, 0.3); transition: 0.2s; }
        .submit-btn:hover { background-color: #e5940c; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(246, 161, 17, 0.4); }
        
        /* Feedback styles */
        .correct-answer { background-color: #d4edda !important; color: #155724; font-weight: 600;}
        .wrong-answer { background-color: #f8d7da !important; color: #721c24; }
        .explanation-box { background-color: #f8f9fa; border-left: 4px solid #17a2b8; padding: 15px; border-radius: 4px; margin-top: 20px; font-size: 14.5px;}
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar-custom sticky-top">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
        <!-- Logo -->
        <div class="d-flex align-items-center">
            <div class="logo-icon">U<span>X</span></div>
            <div class="logo-text">UI/UX<br>Masterclass</div>
        </div>
        
        <!-- Back Link -->
        <a th:href="@{/baihoc/{id}(id=${baiHoc != null ? baiHoc.maBH : 1})}" class="d-flex align-items-center gap-2 flex-grow-1 ms-4">
            <i class="bi bi-arrow-left"></i> Trở về Bài Học
        </a>
        
        <!-- Test Title -->
        <div class="d-none d-md-block" style="font-weight: 400; font-size: 15px;">
            Bài Test: <span th:text="${baiHoc != null ? baiHoc.tenBH : 'Nguyên Lý Gestalt Trong Thiết Kế UI'}">Nguyên Lý Gestalt Trong Thiết Kế UI</span>
        </div>
    </div>
</nav>

<div class="container">
    <div class="quiz-container">
        
        <!-- Render Real Questions from DB -->
        <form id="quizForm" th:if="${tracNghiemList != null && not #lists.isEmpty(tracNghiemList)}">
            <div class="quiz-card" th:each="tn, stat : ${tracNghiemList}" th:id="'questionCard' + ${tn.maTN}">
                <div class="quiz-title" th:if="${stat.first}">Bài Kiểm Tra Trắc Nghiệm</div>
                
                <h3 class="question-title" th:text="'Câu ' + ${stat.count} + ': ' + ${tn.noiDungCauHoi}">Câu hỏi</h3>
                
                <div class="options-container">
                    <label class="option-label" th:each="da, daStat : ${tn.danhSachDapAn}">
                        <input type="radio" class="option-input" th:name="'q_' + ${tn.maTN}" th:value="${da.isCorrect}">
                        <span th:text="${da.noiDungDapAn}">Đáp án</span>
                    </label>
                </div>

                <!-- Explanation -->
                <div class="explanation-box d-none" th:id="'explain' + ${tn.maTN}">
                    <strong>💡 Giải thích: </strong><span th:text="${tn.loiGiaiThich}">Giải thích</span>
                </div>
            </div>
            
            <div class="text-center mt-3 mb-5">
                <button type="button" class="submit-btn" onclick="submitQuiz()">Nộp Bài & Xem Kết Quả</button>
            </div>
        </form>

        <!-- Fallback Parity UI for Screenshot when Empty -->
        <div th:if="${tracNghiemList == null || #lists.isEmpty(tracNghiemList)}">
            <div class="quiz-card">
                <div class="quiz-title">Bài Kiểm Tra Trắc Nghiệm</div>
                
                <h3 class="question-title">Câu 1: Nguyên lý Proximity (Gần gũi) trong Gestalt có ý nghĩa gì?</h3>
                
                <div class="options-container">
                    <label class="option-label">
                        <input type="radio" name="q_demo" class="option-input" value="false">
                        <span>Các phần tử giống nhau là một nhóm</span>
                    </label>
                    <label class="option-label">
                        <input type="radio" name="q_demo" class="option-input" value="true">
                        <span>Các phần tử đặt gần nhau là một nhóm</span>
                    </label>
                    <label class="option-label">
                        <input type="radio" name="q_demo" class="option-input" value="false">
                        <span>Các phần tử có chung màu sắc là một nhóm</span>
                    </label>
                </div>
            </div>

            <div class="text-center mt-3 mb-5">
                <button type="button" class="submit-btn" onclick="submitQuizDemo()">Nộp Bài & Xem Kết Quả</button>
            </div>
        </div>

    </div>
</div>

<script>
    // Xử lý quiz thực tế từ DB
    function submitQuiz() {
        let score = 0;
        let total = document.querySelectorAll('.quiz-card').length;
        
        document.querySelectorAll('.quiz-card').forEach(card => {
            let selectedOption = card.querySelector('.option-input:checked');
            let explanationBox = card.querySelector('.explanation-box');
            
            if (explanationBox) {
                explanationBox.classList.remove('d-none');
            }

            card.querySelectorAll('.option-label').forEach(label => {
                let radio = label.querySelector('.option-input');
                radio.disabled = true;
                
                if (radio.value === 'true') {
                    label.classList.add('correct-answer');
                }
            });

            if (selectedOption) {
                if (selectedOption.value === 'true') {
                    score++;
                } else {
                    selectedOption.closest('.option-label').classList.add('wrong-answer');
                }
            }
        });

        alert('🎉 Bạn đã nộp bài xong!\n\nĐiểm của bạn: ' + score + ' / ' + total + ' câu đúng.');
    }

    // Xử lý quiz demo (fallback)
    function submitQuizDemo() {
        let labels = document.querySelectorAll('.option-label');
        let selected = document.querySelector('input[name="q_demo"]:checked');
        
        labels.forEach(lbl => {
            let rdo = lbl.querySelector('input');
            rdo.disabled = true;
            if(rdo.value === 'true') {
                lbl.classList.add('correct-answer');
            }
        });

        if(selected && selected.value !== 'true') {
            selected.closest('.option-label').classList.add('wrong-answer');
        }

        let score = (selected && selected.value === 'true') ? 1 : 0;
        alert('🎉 Bạn đã nộp bài xong!\n\nĐiểm của bạn: ' + score + ' / 1 câu đúng.');
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
