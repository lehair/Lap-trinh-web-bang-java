<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Quản Lý Trắc Nghiệm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container"><a class="navbar-brand" href="/">UI/UX E-Learning Admin</a></div>
</nav>

<div class="container">
    <div class="row">
        <!-- Sidebar Navigation -->
        <div class="col-md-3">
            <div class="list-group">
                <a href="/admin/danhmuc" class="list-group-item list-group-item-action">Quản lý Danh mục</a>
                <a href="/admin/baihoc" class="list-group-item list-group-item-action">Quản lý Bài học</a>
                <a href="/admin/tracnghiem" class="list-group-item list-group-item-action active">Quản lý Trắc nghiệm</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-9">
            <div th:if="${param.success}" class="alert alert-success">Thao tác thành công!</div>
            
            <div class="card shadow-sm mb-4">
                <div class="card-header text-white" th:classappend="${editTn != null ? 'bg-warning text-dark' : 'bg-primary'}">
                    <h5 class="mb-0" th:text="${editTn != null ? 'Cập Nhật Câu Hỏi' : 'Thêm Câu Hỏi Mới'}">Thêm Câu Hỏi Mới</h5>
                </div>
                <div class="card-body">
                    <form th:action="${editTn != null ? '/admin/tracnghiem/update' : '/admin/tracnghiem/add'}" method="POST" class="needs-validation" novalidate>
                        <input type="hidden" name="maTN" th:value="${editTn != null ? editTn.maTN : ''}">
                        <div class="mb-3">
                            <label class="form-label">Nội dung câu hỏi <span class="text-danger">*</span></label>
                            <textarea class="form-control" name="noiDungCauHoi" rows="2" required th:text="${editTn != null ? editTn.noiDungCauHoi : ''}"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Thuộc Bài Học (ID) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" name="maBH" th:value="${editTn != null ? editTn.maBH : ''}" required>
                        </div>
                        
                        <hr>
                        <h6 class="fw-bold">Các Đáp Án:</h6>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Đáp án A <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="dapAnA" required th:value="${editTn != null and editTn.danhSachDapAn.size() > 0 ? editTn.danhSachDapAn[0].noiDungDapAn : ''}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Đáp án B <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="dapAnB" required th:value="${editTn != null and editTn.danhSachDapAn.size() > 1 ? editTn.danhSachDapAn[1].noiDungDapAn : ''}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Đáp án C <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="dapAnC" required th:value="${editTn != null and editTn.danhSachDapAn.size() > 2 ? editTn.danhSachDapAn[2].noiDungDapAn : ''}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Đáp án D <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="dapAnD" required th:value="${editTn != null and editTn.danhSachDapAn.size() > 3 ? editTn.danhSachDapAn[3].noiDungDapAn : ''}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Chọn đáp án ĐÚNG <span class="text-danger">*</span></label>
                            <select name="dapAnDung" class="form-select" required>
                                <option value="A" th:selected="${editTn != null and editTn.danhSachDapAn.size() > 0 and editTn.danhSachDapAn[0].isCorrect}">Đáp án A</option>
                                <option value="B" th:selected="${editTn != null and editTn.danhSachDapAn.size() > 1 and editTn.danhSachDapAn[1].isCorrect}">Đáp án B</option>
                                <option value="C" th:selected="${editTn != null and editTn.danhSachDapAn.size() > 2 and editTn.danhSachDapAn[2].isCorrect}">Đáp án C</option>
                                <option value="D" th:selected="${editTn != null and editTn.danhSachDapAn.size() > 3 and editTn.danhSachDapAn[3].isCorrect}">Đáp án D</option>
                            </select>
                        </div>
                        <hr>

                        <div class="mb-3">
                            <label class="form-label">Lời giải thích (Hiển thị khi học viên sai)</label>
                            <textarea class="form-control" name="loiGiaiThich" rows="2" th:text="${editTn != null ? editTn.loiGiaiThich : ''}"></textarea>
                        </div>
                        <button type="submit" class="btn btn-success" th:text="${editTn != null ? 'Lưu Thay Đổi' : 'Thêm Mới'}">Lưu</button>
                        <a th:if="${editTn != null}" href="/admin/tracnghiem" class="btn btn-secondary">Hủy</a>
                    </form>
                </div>
            </div>

            <!-- Table hiển thị dữ liệu -->
            <h4>Danh sách Câu hỏi</h4>
            <table class="table table-bordered table-hover bg-white shadow-sm">
                <thead class="table-dark"><tr><th>ID</th><th>Nội dung câu hỏi</th><th>Bài Học ID</th><th>Thao Tác</th></tr></thead>
                <tbody>
                    <tr th:each="tn : ${tracNghiemList}">
                        <td th:text="${tn.maTN}"></td>
                        <td th:text="${tn.noiDungCauHoi}"></td>
                        <td th:text="${tn.maBH}"></td>
                        <td>
                            <a th:href="@{/admin/tracnghiem/edit/{id}(id=${tn.maTN})}" class="btn btn-sm btn-warning">Sửa</a>
                            <a th:href="@{/admin/tracnghiem/delete(id=${tn.maTN})}" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script>
    (function () { 'use strict'; var forms = document.querySelectorAll('.needs-validation'); Array.prototype.slice.call(forms).forEach(function (form) { form.addEventListener('submit', function (event) { if (!form.checkValidity()) { event.preventDefault(); event.stopPropagation(); } form.classList.add('was-validated'); }, false); }); })();
</script>
</body>
</html>
